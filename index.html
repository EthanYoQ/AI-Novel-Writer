<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI小说作家 — AI Novel Writer</title>
  </head>
  <body style="margin: 0;">
    <!-- 同步读取主题，避免加载页与主界面背景色闪跳 -->
    <script>
      (function() {
        var bgMap = { light: '#F7F9FC', galaxy: '#0A1628', paper: '#F8F1E7', dark: '#1E1E1E' };
        var theme = 'dark';
        try {
          var raw = localStorage.getItem('ai-novel-writer-theme');
          if (raw) {
            var state = JSON.parse(raw).state;
            theme = state.resolvedTheme || state.theme || 'dark';
            if (theme === 'night') theme = 'dark'; // 兼容旧版
          }
        } catch(e) {}
        
        var bg = bgMap[theme] || bgMap.galaxy;
        
        // 提前给 html 注入主题 class，确保所有全局 CSS 变量立即生效
        document.documentElement.classList.remove('light', 'dark', 'galaxy', 'paper');
        document.documentElement.classList.add(theme);
        
        document.body.style.backgroundColor = bg;
        /* 将背景色注入 CSS 变量供启动加载器引用 */
        document.documentElement.style.setProperty('--loader-bg', bg);
      })();
    </script>
    <div id="root">
      <style>
        .ai-writer-initial-loader {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          height: 100vh;
          width: 100vw;
          background-color: var(--loader-bg, #0A1628);
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          user-select: none;
        }
        
        .ai-writer-core-container {
          position: relative;
          width: 80px;
          height: 80px;
          display: flex;
          justify-content: center;
          align-items: center;
          margin-bottom: 24px;
        }

        .ai-writer-ring {
          position: absolute;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 2px solid transparent;
          border-top-color: rgba(122, 87, 50, 0.82);
          border-bottom-color: rgba(182, 138, 74, 0.82);
          animation: ai-writer-spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .ai-writer-ring-inner {
          position: absolute;
          width: 65%;
          height: 65%;
          border-radius: 50%;
          border: 2px solid transparent;
          border-left-color: rgba(93, 138, 103, 0.76);
          border-right-color: rgba(198, 138, 58, 0.78);
          animation: ai-writer-spin-reverse 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .ai-writer-core {
          width: 14px;
          height: 14px;
          background: linear-gradient(135deg, #7A5732, #B68A4A);
          border-radius: 50%;
          box-shadow: 0 0 20px rgba(122, 87, 50, 0.45), 0 0 40px rgba(182, 138, 74, 0.32);
          animation: ai-writer-pulse 2s ease-in-out infinite;
        }

        .ai-writer-text {
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 4px;
          text-transform: uppercase;
          background: linear-gradient(90deg, #7A5732, #B68A4A, #5D8A67, #7A5732);
          background-size: 200% auto;
          color: transparent;
          -webkit-background-clip: text;
          background-clip: text;
          animation: ai-writer-text-shine 3s linear infinite;
        }

        @keyframes ai-writer-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        @keyframes ai-writer-spin-reverse {
          0% { transform: rotate(360deg); }
          100% { transform: rotate(0deg); }
        }

        @keyframes ai-writer-pulse {
          0%, 100% { transform: scale(0.8); opacity: 0.8; box-shadow: 0 0 15px rgba(122, 87, 50, 0.38); }
          50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 30px rgba(182, 138, 74, 0.58), 0 0 50px rgba(93, 138, 103, 0.34); }
        }

        @keyframes ai-writer-text-shine {
          to { background-position: 200% center; }
        }
      </style>
      <div class="ai-writer-initial-loader">
        <div class="ai-writer-core-container">
          <div class="ai-writer-ring"></div>
          <div class="ai-writer-ring-inner"></div>
          <div class="ai-writer-core"></div>
        </div>
        <div class="ai-writer-text">AI小说作家 初始化中</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
